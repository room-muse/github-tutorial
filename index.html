<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Tutorial</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 40px;
        text-align: center;
      }
      h1 {
        margin-bottom: 12px;
      }
      p {
        color: #555;
        margin-bottom: 24px;
      }
      .top-bar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 32px;
      }
      .dark-mode-button {
        background-color: #222;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 20px;
        font-size: 14px;
        cursor: pointer;
      }
      .button-row {
        display: flex;
        justify-content: center;
        gap: 12px;
      }
      button {
        border: none;
        padding: 12px 20px;
        color: white;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }
      .button-1 {
        background-color: orange;
      }
      .button-2 {
        background-color: lightblue;
      }
      .button-3 {
        background-color: green;
      }
      .button-4 {
        background-color: purple;
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <button class="dark-mode-button">Dark Mode</button>
    </div>
    <h1>GitHub Tutorial</h1>
    <div class="button-row">
      <button class="button-1">Orange Button</button>
      <button class="button-2">Blue Button</button>
      <button class="button-3">Green Button</button>
      <button class="button-4">Purple Button</button>
    </div>
  </body>
</html>
